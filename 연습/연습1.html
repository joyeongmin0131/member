    <title>조영민의 자서전</title>

<body>
    <h1>조영민</h1>
    <h3>영민이의 간단한 소개입니다.</h3>
    <hr>
    <p>안녕하세요. <br>저는 <b>영민</b>입니다.</p> 
    <hr>
    <ul>
        <li>탄생: <strong>2008년 1월 31일</strong> 전라남도 진도</li>
        <li>초등학교: 신흥초등학교<i>(1년)</i> → 대불초등학교<i>(5년 및 졸업)</i></li>
        <li>중학교: 삼호중학교<em>(3년)</em></li>
        <li>고등학교: 삼호고등고등학교<em>(2년 및 재학중)</em></li>
    </ul>
    <ol>
        <li>취미: 게임<i>(원신)</i>, 스팀 게임<i>(최근에 컵헤드를 시작함)</i></li>
        <li>좋아하는 음식: 부대찌개, 김치볶음밥<em>(어머니표)</em></li>
        <dt>희망 진로</dt>
        <dd>AI 개발자</dd>
    </ol>
</body>
